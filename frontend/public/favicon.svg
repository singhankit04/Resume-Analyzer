<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" /> <!-- Violet-500 -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Cyan-500 -->
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" /> <!-- Slate-800 -->
      <stop offset="100%" stop-color="#0f172a" /> <!-- Slate-900 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular Outer Glowing Ring -->
  <circle cx="256" cy="256" r="230" fill="#0b0f17" stroke="url(#bgGrad)" stroke-width="12" />
  
  <!-- Subtle inner background glow -->
  <circle cx="256" cy="256" r="190" fill="url(#bgGrad)" opacity="0.08" />

  <!-- Document (Resume) Shape -->
  <g transform="translate(136, 126)" filter="url(#glow)">
    <!-- Document Base (Rounded Card) -->
    <rect x="0" y="0" width="240" height="270" rx="28" fill="url(#docGrad)" stroke="#334155" stroke-width="4" />
    
    <!-- Content Lines (representing resume headings & details) -->
    <rect x="36" y="44" width="75" height="12" rx="6" fill="#8b5cf6" opacity="0.9" />
    <rect x="36" y="80" width="168" height="8" rx="4" fill="#475569" opacity="0.7" />
    <rect x="36" y="104" width="130" height="8" rx="4" fill="#475569" opacity="0.7" />
    <rect x="36" y="128" width="168" height="8" rx="4" fill="#475569" opacity="0.7" />
    
    <rect x="36" y="170" width="55" height="12" rx="6" fill="#06b6d4" opacity="0.9" />
    <rect x="36" y="206" width="168" height="8" rx="4" fill="#475569" opacity="0.7" />
    <rect x="36" y="230" width="110" height="8" rx="4" fill="#475569" opacity="0.7" />
  </g>

  <!-- AI Sparkle Icons overlaying the document -->
  <g transform="translate(290, 80)">
    <!-- Main Sparkle -->
    <path d="M40 0 C40 22, 58 40, 80 40 C58 40, 40 58, 40 80 C40 58, 22 40, 0 40 C22 40, 40 22, 40 0 Z" fill="url(#bgGrad)" />
    <!-- Secondary Sparkle -->
    <path d="M10 75 C10 84, 17 91, 26 91 C17 91, 10 98, 10 107 C10 98, 3 91, -6 91 C3 91, 10 84, 10 75 Z" fill="#22d3ee" />
  </g>
</svg>